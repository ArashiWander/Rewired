# Notification configuration

channels:
  telegram:
    enabled: true
    # bot_token and chat_id are in .env
  console:
    enabled: true

schedules:
  signal_check:
    interval_hours: 4
    weekdays_only: true
    active_hours_start: "08:00"
    active_hours_end: "22:00"

  portfolio_refresh:
    time: "18:30"
    weekdays_only: true

  weekly_summary:
    day: monday
    time: "08:00"

  ai_analysis:
    day: sunday
    time: "20:00"

alert_on:
  signal_color_change: true
  position_drift_pct: 5.0
  daily_portfolio_summary: true
