# Rewired Index - Signal Rules Configuration
# Boolean decision rules per the Agentic Decision System blueprint.
# Rules are evaluated top-to-bottom (most defensive first).
# Scoring: RED=1pt, ORANGE=2pts, YELLOW=3pts, GREEN=4pts (higher=better).

# ── Category Weights (must sum to 1.0) ────────────────────────────────────
weights:
  ai_health: 0.50    # The moat - absolute veto power
  macro: 0.30        # The water level
  sentiment: 0.20    # The contrarian indicator

# ── Macro Rules (Dimension 1: The Water Level) ───────────────────────────
macro:
  # Data sources for the rules engine
  data_sources:
    ism_pmi:
      source: fred
      series_id: NAPM           # ISM Manufacturing PMI
    core_pce_mom:
      source: fred
      series_id: PCEPILFE       # Core PCE Price Index (compute MoM %)
    retail_sales_mom:
      source: fred
      series_id: RSAFS          # Advance Retail Sales (compute MoM %)
    yield_curve:
      source: fred
      series_id: T10Y2Y         # 10-Year minus 2-Year Treasury spread
    unemployment:
      source: fred
      series_id: UNRATE         # Civilian Unemployment Rate
    nonfarm_payrolls:
      source: fred
      series_id: PAYEMS         # Total Nonfarm Payrolls (thousands)
    # Supporting (informational, not used in boolean rules)
    gdp_growth:
      source: fred
      series_id: A191RL1Q225SBEA
    capacity_utilization:
      source: fred
      series_id: TCU
    initial_jobless_claims:
      source: fred
      series_id: ICSA
    cpi_yoy:
      source: fred
      series_id: CPIAUCSL
    consumer_sentiment:
      source: fred
      series_id: UMCSENT

  rules:
    red:
      # Confirmed Recession: PMI < 48 for 2 consecutive months AND Retail Sales MoM negative
      pmi_threshold: 48
      pmi_consecutive_months: 2
      retail_sales_negative: true
    orange:
      # Stagflation/Defense: Core PCE > 0.2% MoM AND Yield Curve inverted
      pce_mom_threshold: 0.2
      yield_curve_inverted: true
    yellow:
      # Slowdown/Transition: Unemployment rises > 0.2% in single month BUT PMI > 50
      unemployment_mom_rise: 0.2
      pmi_above: 50
    green:
      # Goldilocks: PMI > 50 AND disinflation intact (PCE <= 0.2% MoM)
      pmi_above: 50
      pce_mom_max: 0.2

# ── Sentiment Rules (Dimension 2: The Contrarian Indicator) ──────────────
sentiment:
  # Dual Radar: Radar A (macro liquidity) + Radar B (tech stress)
  data_sources:
    # Radar B — Tech Sector Velocity & Level (NASDAQ-100)
    vxn_level:
      source: yfinance
      ticker: "^VXN"            # NASDAQ-100 implied volatility
    # Radar A — Macro Term Structure (S&P 500)
    vix_term_structure:
      source: yfinance
      tickers:
        - "^VIX"               # Spot VIX (S&P 500 30-day implied vol)
        - "^VIX3M"             # 3-month VIX (longer-dated)
      # Contango: VIX3M > VIX = normal/calm
      # Backwardation: VIX > VIX3M = panic/hedging
    velocity:
      window_days: 3              # 3 trading days (index-based, avoids weekends)
      spike_threshold_pct: 20.0   # 20% rise in 3 trading days
      min_absolute: 18            # only trigger if VXN > 18

  rules:
    red:
      # Liquidity Crisis: VXN > 35 AND severe backwardation
      vxn_above: 35
      term_structure_backwardation: true
    orange:
      # Deteriorating: VXN > 25 AND 5MA > 20MA (expanding volatility)
      vxn_above: 25
      vxn_trend_upward: true   # 5-day MA > 20-day MA
    yellow:
      # Divergence: VXN between 18-25
      vxn_low: 18
      vxn_high: 25
    green:
      # Stable/Complacent: VXN < 18 AND normal contango
      vxn_below: 18
      term_structure_contango: true

# ── AI Health Rules (Dimension 3: The Moat - Absolute Veto Power) ────────
ai_health:
  data_sources:
    capex_analysis:
      source: gemini
      grounded: true           # Uses EDGAR + Google Search grounding
      cache_hours: 12
    semiconductor_momentum:
      source: yfinance
      ticker: SMH
    cloud_momentum:
      source: yfinance
      ticker: WCLD
    hyperscaler_tickers:
      - MSFT
      - GOOGL
      - AMZN
      - META

  rules:
    red:
      # VETO: Significant YoY contraction AND fatal management phrasing
      capex_trend: contracting
      veto_power: true
      yoy_contraction_threshold: -5.0
      fatal_phrases:
        - "weakening demand"
        - "ROI pressure"
        - "cutting infrastructure spend"
    orange:
      # ROI Anxiety / Efficiency Phase: mild dip or deceleration
      capex_trend: decelerating
      yoy_mild_dip_min: -5.0
      yoy_mild_dip_max: 0.0
      management_keywords:
        - "ROI pressure"
        - "efficiency"
        - "optimizing existing infrastructure"
    yellow:
      # Digestion: CapEx meets but doesn't beat estimates
      capex_trend: stable
    green:
      # Arms Race: CapEx beats QoQ, strong forward guidance
      capex_trend: accelerating
      management_keywords:
        - "compute supply constraints"
        - "unprecedented demand"
        - "aggressively increasing infrastructure"
      # NVDA 3-month return vs S&P 500 3-month return
      weight: 0.20
