# Portfolio configuration for Rewired Index — 2D L×T Constraint Solver

total_capital_eur: 3100.0

# Static layer budget percentages (of investable capital after cash floor)
# L4 is NOT listed here — it is the dynamic residual: Total - (Cash + L1 + L2 + L3 + L5)
layer_budgets:
  L1: 0.175   # Physical Infrastructure  (17.5%)
  L2: 0.190   # Digital Infrastructure   (19.0%)
  L3: 0.250   # Core Intelligence        (25.0%)
  L5: 0.075   # Frontier Exploration      (7.5%)

# Cash floor mapping — minimum cash reserve by regime color
cash_floors:
  green: 0.05
  yellow: 0.15
  orange: 0.30
  red: 0.70

# Intra-layer tier allocation ratios (must sum < 1.0; remainder = structural buffer)
tier_ratios:
  T1: 0.500   # Core holdings
  T2: 0.275   # Growth engine
  T3: 0.100   # Thematic allocation
  T4: 0.055   # Speculation
  # 7% structural buffer (unallocated → cascades to L4 or cash)

# Position constraints
constraints:
  max_single_position_pct: 15.0
  min_position_eur: 10.0
  max_positions: 15
  rebalance_threshold_pct: 5.0
